services:
  - type: web
    name: fazo-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: APP_NAME
        value: Fazo Admin
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ADMIN_INITIAL_USERNAME
        value: admin
      - key: ADMIN_INITIAL_EMAIL
        value: admin@fazo.uz
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
